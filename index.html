<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Oscars Ballot</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- PDF manipulation and rendering libraries -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg-color: #14181c;
      --panel-bg: #1c2228;
      --panel-border: #2c3440;
      --text-main: #fff;
      --text-muted: #8899aa;
      --brand-green: #00e054;
      --brand-green-hover: #00c04b;
      --brand-blue: #40bcf4;
      --brand-blue-hover: #2b9ed3;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0 0 110px 0;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      text-align: center;
      padding: 40px 20px 30px;
    }

    h1 {
      color: var(--text-main);
      margin: 0 0 10px 0;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
    }

    .subtitle {
      margin: 0;
      font-size: 1.1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .grid-form {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    fieldset {
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 20px;
      background-color: var(--panel-bg);
      transition: border-color 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    fieldset:hover { border-color: #3d4a5c; }

    legend {
      color: var(--text-main);
      font-weight: 600;
      font-size: 1.15rem;
      padding: 0 10px;
      margin-left: -10px;
    }

    .nominee-label {
      display: flex;
      align-items: flex-start;
      margin-top: 14px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: color 0.2s;
      position: relative;
    }

    .nominee-label:hover .nominee-text { color: var(--text-main); }

    input[type="radio"] { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }

    .custom-radio {
      width: 18px; height: 18px;
      border: 2px solid #556677; border-radius: 50%;
      display: inline-block; position: relative;
      margin-right: 14px; margin-top: 2px; flex-shrink: 0;
      transition: all 0.2s ease-in-out;
    }

    input[type="radio"]:checked ~ .custom-radio { border-color: var(--brand-green); }

    input[type="radio"]:checked ~ .custom-radio::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      width: 10px; height: 10px;
      background-color: var(--brand-green); border-radius: 50%;
      animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    input[type="radio"]:checked ~ .nominee-text {
      color: var(--text-main); font-weight: 500;
    }

    /* Image-Only Tooltip Styling */
    .wiki-tooltip {
      position: fixed; z-index: 9999;
      width: 180px; 
      background: rgba(20, 24, 28, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      border-radius: 10px; padding: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      pointer-events: none; opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2), transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2);
      display: flex; flex-direction: column; align-items: center;
    }

    .wiki-tooltip.visible { opacity: 1; transform: translateY(0); }

    .tooltip-img {
      width: 100%; height: auto;
      max-height: 240px;
      object-fit: cover;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      display: none;
    }

    .tooltip-title {
      font-weight: 600;
      color: var(--text-main);
      margin-top: 10px;
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.3;
    }

    /* Sticky Footer */
    .sticky-footer {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(20, 24, 28, 0.95);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--panel-border);
      padding: 15px 0; z-index: 1000;
    }

    .footer-content {
      max-width: 1200px; margin: 0 auto; padding: 0 20px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 15px;
    }

    .progress-tracker { display: flex; align-items: center; gap: 15px; font-weight: 600; color: var(--text-main); }
    .progress-bar-bg { width: 150px; height: 8px; background: var(--panel-border); border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--brand-green); width: 0%; transition: width 0.3s ease; }

    .button-group { display: flex; gap: 12px; flex-wrap: wrap; }

    button {
      padding: 12px 20px; font-size: 0.95rem; font-weight: 600;
      border-radius: 6px; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-pdf { background-color: var(--brand-green); color: #fff; }
    .btn-pdf:hover:not(:disabled) { background-color: var(--brand-green-hover); transform: translateY(-1px); }
    
    .btn-png { background-color: var(--brand-blue); color: #fff; }
    .btn-png:hover:not(:disabled) { background-color: var(--brand-blue-hover); transform: translateY(-1px); }
    
    .btn-secondary { background-color: #445566; color: #fff; }
    .btn-secondary:hover:not(:disabled) { background-color: #556677; }
    
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .loader {
      display: none; width: 16px; height: 16px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .footer-content { flex-direction: column; text-align: center; }
      .progress-tracker, .button-group { width: 100%; justify-content: center; }
    }
  </style>

  <script>
    // Bypass strict cross-origin checks for local execution of PDF.js workers
    const workerBlob = new Blob([`importScripts('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js');`], { type: 'application/javascript' });
    pdfjsLib.GlobalWorkerOptions.workerPort = new Worker(URL.createObjectURL(workerBlob));
  </script>
</head>
<body>

<div class="header">

  <p class="subtitle">Select your winners. Leave a category blank if undecided. Hover over options to view images.</p>

<div class="container">

<div class="sticky-footer">
  <div class="footer-content">
    <div class="progress-tracker">
      <div class="progress-text" id="progress-text">0 / 24 Selected</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
    </div>
    <div class="button-group">

  </div>
</div>

    { "name": "Music (Original Song)", "nominees":["Dear Me—Diane Warren: Relentless", "Golden—KPop Demon Hunters", "I Lied To You—Sinners", "Sweet Dreams Of Joy—Viva Verdi!", "Train Dreams—Train Dreams"], "coords": [[449.08, 459.53],[449.08, 448.74],[449.08, 437.95],[449.08, 427.16],[448.73, 416.37]] },

    { "name": "Sound", "nominees":["F1", "Frankenstein", "One Battle After Another", "Sinners", "Sirāt"], "coords": [[449.08, 311.23],[449.08, 300.44],[448.73, 289.65],[449.08, 279.2],[449.08, 268.41]] },
    { "name": "Visual Effects", "nominees":["Avatar: Fire and Ash", "F1", "Jurassic World Rebirth", "The Lost Bus", "Sinners"], "coords": [[449.08, 237.08],[449.08, 226.63],[449.08, 215.84],[449.08, 205.05],[449.08, 194.26]] },
    { "name": "Writing (Adapted Screenplay)", "nominees":["Bugonia", "Frankenstein", "Hamnet", "One Battle After Another", "Train Dreams"], "coords": [[449.08, 163.27],[449.08, 152.48],[449.08, 141.69],[449.08, 130.9],[449.08, 120.11]] },
    { "name": "Writing (Original Screenplay)", "nominees":["Blue Moon", "It Was Just an Accident", "Marty Supreme", "Sentimental Value", "Sinners"], "coords": [[449.08, 88.77],[449.08, 77.98],[449.08, 67.19],[449.08, 56.4],[448.73, 45.61]] },
    { "name": "Best Picture", "nominees":[ "Bugonia", "F1", "Frankenstein", "Hamnet", "Marty Supreme", "One Battle After Another", "The Secret Agent", "Sentimental Value", "Sinners", "Train Dreams" ],
      "coords": [[169.19, 109.31],[168.84, 96.08],[169.19, 82.86],[169.19, 69.28],[168.84, 55.7],[309.13, 109.31],[308.78, 96.08],[309.13, 82.86],[309.13, 69.28],[309.13, 55.7]]
    }
  ];

  const formGrid = document.getElementById('form-grid');
  
  // Build DOM
  categories.forEach((cat, catIndex) => {
    const fieldset = document.createElement('fieldset');
    const legend = document.createElement('legend');
    legend.textContent = cat.name;
    fieldset.appendChild(legend);

    cat.nominees.forEach((nominee, nomIndex) => {
      const label = document.createElement('label');
      label.className = 'nominee-label';
      
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = `cat_${catIndex}`;
      radio.value = nomIndex;
      radio.dataset.wasChecked = "false";
      
      radio.addEventListener('click', function(e) {
        if (this.dataset.wasChecked === "true") {
          this.checked = false;
          this.dataset.wasChecked = "false";
        } else {
          document.querySelectorAll(`input[name="${this.name}"]`).forEach(r => r.dataset.wasChecked = "false");
          this.dataset.wasChecked = "true";
        }
        updateProgress();
      });

      const customRadio = document.createElement('span');
      customRadio.className = 'custom-radio';
      
      const textSpan = document.createElement('span');
      textSpan.className = 'nominee-text';
      textSpan.textContent = nominee;
      
      label.appendChild(radio);
      label.appendChild(customRadio);
      label.appendChild(textSpan);
      fieldset.appendChild(label);
    });
    
    if (cat.name === 'Best Picture') {
      fieldset.style.gridColumn = '1 / -1';
      fieldset.style.display = 'grid';
      fieldset.style.gridTemplateColumns = 'repeat(auto-fit, minmax(280px, 1fr))';
    }
    formGrid.appendChild(fieldset);
  });

  function updateProgress() {
    const total = categories.length;
    const filled = new Set();
    document.querySelectorAll('input[type="radio"]:checked').forEach(el => filled.add(el.name));
    
    const count = filled.size;
    document.getElementById('progress-text').innerText = `${count} / ${total} Categories Selected`;
    document.getElementById('progress-bar').style.width = `${(count / total) * 100}%`;
  }

  function clearForm() {
    document.getElementById('ballot-form').reset();
    document.querySelectorAll('input[type="radio"]').forEach(r => r.dataset.wasChecked = "false");
    updateProgress();
  }

  // Wikipedia Image Tooltips
  const tooltipCache = {};
  let hoverTimeout;
  let mouseX = 0; let mouseY = 0;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX; mouseY = e.clientY;
    const tooltip = document.getElementById('wiki-tooltip');
    if (tooltip && tooltip.classList.contains('visible')) {
      let x = mouseX + 15; let y = mouseY + 15;
      if (x + 200 > window.innerWidth) x = mouseX - 195; 
      if (y + 280 > window.innerHeight) y = window.innerHeight - 280;
      tooltip.style.left = `${x}px`; tooltip.style.top = `${y}px`;
    }
  });

  function initTooltips() {
    const tooltip = document.createElement('div');
    tooltip.id = 'wiki-tooltip'; tooltip.className = 'wiki-tooltip';
    tooltip.innerHTML = `<img src="" alt="" id="tt-img" class="tooltip-img"><div class="tooltip-title" id="tt-title"></div>`;
    document.body.appendChild(tooltip);

    document.querySelectorAll('.nominee-label').forEach(label => {
      label.addEventListener('mouseenter', () => {
        clearTimeout(hoverTimeout);
        hoverTimeout = setTimeout(async () => {
          const textElement = label.querySelector('.nominee-text');
          const fullText = textElement.textContent;
          const category = label.closest('fieldset').querySelector('legend').textContent;
          
          tooltip.classList.add('visible');
          
          let x = mouseX + 15; let y = mouseY + 15;
          if (x + 200 > window.innerWidth) x = mouseX - 195;
          if (y + 280 > window.innerHeight) y = window.innerHeight - 280;
          tooltip.style.left = `${x}px`; tooltip.style.top = `${y}px`;

          document.getElementById('tt-title').textContent = "Loading image...";
          document.getElementById('tt-img').style.display = 'none';
          
          let query = fullText;
          let displayName = fullText;

          if (fullText.includes('—')) {
            const parts = fullText.split('—');
            if (['Actor', 'Actress', 'Directing', 'Music', 'Costume', 'Makeup', 'Casting'].some(c => category.includes(c))) {
              query = parts[0].trim(); displayName = parts[0].trim();
            } else {
              query = parts[1].trim() + " film"; displayName = parts[1].trim();
            }
          } else {
            query = fullText + " film"; displayName = fullText;
          }

          if (!tooltipCache[query]) {
             try {
               const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=pageimages&generator=search&piprop=thumbnail&pithumbsize=400&origin=*&gsrsearch=${encodeURIComponent(query)}&gsrlimit=1`;
               const response = await fetch(url);
               const data = await response.json();
               
               if (data.query && data.query.pages) {
                 const pageId = Object.keys(data.query.pages)[0];
                 const page = data.query.pages[pageId];
                 tooltipCache[query] = { title: displayName, image: page.thumbnail ? page.thumbnail.source : null };
               } else {
                 tooltipCache[query] = { title: displayName, image: null };
               }
             } catch(err) { tooltipCache[query] = { title: displayName, image: null }; }
          }
          
          if (!tooltip.classList.contains('visible')) return;
          const result = tooltipCache[query];
          const imgEl = document.getElementById('tt-img');
          
          if (result.image) {
            imgEl.src = result.image; imgEl.style.display = 'block';
            document.getElementById('tt-title').textContent = result.title;
          } else {
            imgEl.style.display = 'none';
            document.getElementById('tt-title').textContent = result.title + " (No image)";
          }
        }, 350); 
      });
      label.addEventListener('mouseleave', () => {
        clearTimeout(hoverTimeout); document.getElementById('wiki-tooltip').classList.remove('visible');
      });
    });
  }

  // Highly Resilient PDF Fetcher
  async function fetchBallotTemplate(btnText) {
    const originalUrl = 'https://a2.ltrbxd.com/oscars/2026/letterboxd-2026-oscars-ballot.pdf';
    const encodedUrl = encodeURIComponent(originalUrl);
    
    // Failover array to instantly route around dead proxies
    const endpoints =[
      originalUrl, 
      `https://corsproxy.io/?${encodedUrl}`, 
      `https://api.allorigins.win/raw?url=${encodedUrl}`,
      `https://api.codetabs.com/v1/proxy?quest=${encodedUrl}`
    ];

    for (let i = 0; i < endpoints.length; i++) {
      try {
        btnText.innerText = `Fetching template (Proxy ${i+1}/${endpoints.length})...`;
        
        // Impose a strict 10 second timeout so broken proxies don't hang the script
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); 

        const response = await fetch(endpoints[i], { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (!response.ok) continue; 
        
        const arrayBuffer = await response.arrayBuffer();
        
        // Ensure the downloaded data is actually a PDF and not a proxy's HTML error page
        const view = new Uint8Array(arrayBuffer);
        if (view[0] === 0x25 && view[1] === 0x50 && view[2] === 0x44 && view[3] === 0x46) {
          return arrayBuffer;
        }
      } catch (e) {
        console.warn(`Attempt ${i+1} failed:`, e);
      }
    }
    throw new Error("All template download attempts failed. A firewall or adblocker may be interfering.");
  }

  // Document Generator
  async function generateFile(format) {
    const btns = document.querySelectorAll('button');
    const loader = document.getElementById(`loader-${format}`);
    const btnText = document.getElementById(`text-${format}`);
    const originalText = format === 'pdf' ? 'Save PDF' : 'Save PNG';
    
    btns.forEach(b => b.disabled = true);
    loader.style.display = 'inline-block';

    try {
      const existingPdfBytes = await fetchBallotTemplate(btnText);

      btnText.innerText = 'Applying selections...';
      const { PDFDocument, rgb } = window.PDFLib;
      const pdfDoc = await PDFDocument.load(existingPdfBytes);
      const firstPage = pdfDoc.getPages()[0];

      categories.forEach((cat, catIndex) => {
        const selected = document.querySelector(`input[name="cat_${catIndex}"]:checked`);
        if (selected) {
          const nomIndex = parseInt(selected.value, 10);
          const[x, y] = cat.coords[nomIndex];
          firstPage.drawCircle({ x, y, size: 3.5, color: rgb(0, 0.878, 0.329) });
        }
      });

      const pdfBytes = await pdfDoc.save();

      if (format === 'pdf') {
        btnText.innerText = 'Saving PDF...';
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '2026_Oscars_Ballot_Completed.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
      } else if (format === 'png') {
        btnText.innerText = 'Rendering PNG...';
        const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        
        const scale = 3;
        const viewport = page.getViewport({ scale: scale });
        
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height; canvas.width = viewport.width;
        
        const renderContext = { canvasContext: context, viewport: viewport };
        await page.render(renderContext).promise;
        
        btnText.innerText = 'Saving PNG...';
        const pngUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = pngUrl;
        link.download = '2026_Oscars_Ballot_Completed.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
      
    } catch (error) {
      console.error(error);
      alert('An error occurred. ' + error.message);
    } finally {
      btns.forEach(b => b.disabled = false);
      loader.style.display = 'none';
      btnText.innerText = originalText;
    }
  }

  updateProgress();
  initTooltips();
</script>

</body>
</html>
