<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Oscars Ballot</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- PDF manipulation and rendering libraries -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg-color: #14181c;
      --panel-bg: #1c2228;
      --panel-border: #2c3440;
      --text-main: #fff;
      --text-muted: #8899aa;
      --brand-green: #00e054;
      --brand-green-hover: #00c04b;
      --brand-blue: #40bcf4;
      --brand-blue-hover: #2b9ed3;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0 0 110px 0;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      text-align: center;
      padding: 40px 20px 30px;
    }

    h1 {
      color: var(--text-main);
      margin: 0 0 10px 0;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
    }

    .subtitle {
      margin: 0;
      font-size: 1.1rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .grid-form {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    /* Category Cards */
    .category-card {
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 20px;
      background-color: var(--panel-bg);
      transition: border-color 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    .category-card:hover { border-color: #3d4a5c; }

    .category-title {
      color: var(--text-main);
      font-weight: 600;
      font-size: 1.15rem;
      margin-bottom: 6px;
    }

    .category-desc {
      font-size: 0.85rem;
      color: #667788;
      margin: 0 0 15px 0;
      line-height: 1.35;
    }

    .nominee-label {
      display: flex;
      align-items: flex-start;
      margin-top: 14px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: color 0.2s;
      position: relative;
    }

    .nominee-label:hover .nominee-text { color: var(--text-main); }

    input[type="radio"] { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }

    .custom-radio {
      width: 18px; height: 18px;
      border: 2px solid #556677; border-radius: 50%;
      display: inline-block; position: relative;
      margin-right: 14px; margin-top: 2px; flex-shrink: 0;
      transition: all 0.2s ease-in-out;
    }

    input[type="radio"]:checked ~ .custom-radio { border-color: var(--brand-green); }

    input[type="radio"]:checked ~ .custom-radio::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      width: 10px; height: 10px;
      background-color: var(--brand-green); border-radius: 50%;
      animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: translate(-50%, -50%) scale(0); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    input[type="radio"]:checked ~ .nominee-text { color: var(--text-main); font-weight: 500; }

    /* Rich Content Tooltip Styling */
    .wiki-tooltip {
      position: fixed; z-index: 9999;
      width: max-content; 
      max-width: 500px;
      background: rgba(20, 24, 28, 0.98);
      backdrop-filter: blur(16px);
      border: 1px solid var(--panel-border);
      border-radius: 12px; padding: 16px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.8);
      pointer-events: none; opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2), transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2);
    }

    .wiki-tooltip.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .tooltip-layout {
      display: flex; gap: 16px; align-items: flex-start;
    }

    .tooltip-img {
      width: 120px; height: auto;
      object-fit: cover;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      display: none; flex-shrink: 0;
    }

    .tooltip-content {
      flex: 1; display: flex; flex-direction: column;
    }

    .tooltip-title {
      font-weight: 700; color: var(--brand-green);
      margin-bottom: 8px; font-size: 1.05rem; line-height: 1.2;
    }

    .tooltip-desc {
      color: var(--text-muted); font-size: 0.85rem; line-height: 1.45;
      max-height: 350px; /* Prevents it from going off-screen */
      overflow-y: auto; /* Adds a scrollbar if the JSON text is very long */
      padding-right: 8px;
    }

    /* Custom subtle scrollbar for the tooltip */
    .tooltip-desc::-webkit-scrollbar { width: 6px; }
    .tooltip-desc::-webkit-scrollbar-track { background: transparent; }
    .tooltip-desc::-webkit-scrollbar-thumb { background: #445566; border-radius: 3px; }

    .tooltip-desc strong { color: #fff; }
    .tooltip-desc em { font-style: italic; color: #aabbaa; }
    .tooltip-error { color: #dd6666; font-style: italic; }

    /* Sticky Footer */
    .sticky-footer {
      position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(20, 24, 28, 0.95);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--panel-border);
      padding: 15px 0; z-index: 1000;
    }

    .footer-content {
      max-width: 1200px; margin: 0 auto; padding: 0 20px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 15px;
    }

    .progress-tracker { display: flex; align-items: center; gap: 15px; font-weight: 600; color: var(--text-main); }
    .progress-bar-bg { width: 150px; height: 8px; background: var(--panel-border); border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--brand-green); width: 0%; transition: width 0.3s ease; }

    .button-group { display: flex; gap: 12px; flex-wrap: wrap; }

    button {
      padding: 12px 20px; font-size: 0.95rem; font-weight: 600;
      border-radius: 6px; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-pdf { background-color: var(--brand-green); color: #fff; }
    .btn-pdf:hover:not(:disabled) { background-color: var(--brand-green-hover); transform: translateY(-1px); }
    .btn-png { background-color: var(--brand-blue); color: #fff; }
    .btn-png:hover:not(:disabled) { background-color: var(--brand-blue-hover); transform: translateY(-1px); }
    .btn-secondary { background-color: #445566; color: #fff; }
    .btn-secondary:hover:not(:disabled) { background-color: #556677; }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    .loader {
      display: none; width: 16px; height: 16px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .footer-content { flex-direction: column; text-align: center; }
      .progress-tracker, .button-group { width: 100%; justify-content: center; }
      .wiki-tooltip { max-width: 300px; }
      .tooltip-img { width: 70px; }
    }
  </style>

  <script>
    const workerBlob = new Blob([`importScripts('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js');`], { type: 'application/javascript' });
    pdfjsLib.GlobalWorkerOptions.workerPort = new Worker(URL.createObjectURL(workerBlob));
  </script>
</head>
<body>

<div class="header">
  <h1>2026 Oscars Ballot</h1>
  <p class="subtitle">Select your winners. Leave a category blank if undecided. Hover over options for context.</p>
</div>

<div class="container">
  <form id="ballot-form">
    <div id="form-grid" class="grid-form"></div>
  </form>
</div>

<div class="sticky-footer">
  <div class="footer-content">
    <div class="progress-tracker">
      <div class="progress-text" id="progress-text">0 / 24 Selected</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
    </div>
    <div class="button-group">
      <button type="button" class="btn-secondary" onclick="clearForm()">Clear All</button>
      <button type="button" class="btn-pdf" id="btn-pdf" onclick="generateFile('pdf')">
        <span class="loader" id="loader-pdf"></span>
        <span id="text-pdf">Save PDF</span>
      </button>
      <button type="button" class="btn-png" id="btn-png" onclick="generateFile('png')">
        <span class="loader" id="loader-png"></span>
        <span id="text-png">Save PNG</span>
      </button>
    </div>
  </div>
</div>

<script>
  // JSON Context Fetcher
  let oscarContextData = null;
  let contextLoadError = false;

  async function loadContextJson() {
    try {
      const response = await fetch('info.json');
      if (response.ok) {
        const data = await response.json();
        oscarContextData = data.categories;
      } else {
        contextLoadError = true;
      }
    } catch (e) {
      contextLoadError = true;
      console.warn("Could not load info.json. If running locally via file://, your browser may block local file fetching.");
    }
  }
  loadContextJson();

  // Helper to normalize strings for exact matching
  function normalizeText(str) {
    return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  // Helper to convert bold/italics from info.json to HTML
  function parseMarkdown(text) {
    return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
               .replace(/\*(.*?)\*/g, '<em>$1</em>');
  }

  // Exact coordinate map and definitions
  const categories =[
    { "name": "Actor in a Leading Role", "description": "Awarded for an outstanding leading performance by a male actor.", "nominees":["Timothée Chalamet—Marty Supreme", "Leonardo DiCaprio—One Battle After Another", "Ethan Hawke—Blue Moon", "Michael B. Jordan—Sinners", "Wagner Moura—The Secret Agent"], "coords": [[169.19, 681.29],[168.84, 669.11],[169.19, 657.27],[168.84, 645.09],[169.19, 633.25]] },
    { "name": "Actor in a Supporting Role", "description": "Awarded for an outstanding supporting performance by a male actor.", "nominees":["Benicio Del Toro—One Battle After Another", "Jacob Elordi—Frankenstein", "Delroy Lindo—Sinners", "Sean Penn—One Battle After Another", "Stellan Skarsgård—Sentimental Value"], "coords": [[168.84, 601.22],[169.19, 589.39],[168.84, 577.2],[169.19, 565.37],[168.84, 553.18]] },
    { "name": "Actress in a Leading Role", "description": "Awarded for an outstanding leading performance by a female actor.", "nominees":["Jessie Buckley—Hamnet", "Rose Byrne—If I Had Legs I’d Kick You", "Kate Hudson—Song Sung Blue", "Renate Reinsve—Sentimental Value", "Emma Stone—Bugonia"], "coords": [[168.84, 521.15],[169.19, 509.32],[168.84, 497.13],[169.19, 485.3],[168.84, 473.11]] },
    { "name": "Actress in a Supporting Role", "description": "Awarded for an outstanding supporting performance by a female actor.", "nominees":["Elle Fanning—Sentimental Value", "Inga Ibsdotter Lilleaas—Sentimental Value", "Amy Madigan—Weapons", "Wunmi Mosaku—Sinners", "Teyana Taylor—One Battle After Another"], "coords": [[168.84, 441.08],[169.19, 429.25],[168.84, 417.06],[168.84, 405.23],[169.19, 393.39]] },
    { "name": "Animated Feature Film", "description": "Awarded to the best feature-length animated film.", "nominees":["Arco", "Elio", "KPop Demon Hunters", "Little Amélie or the Character of Rain", "Zootopia 2"], "coords": [[169.19, 361.36],[168.84, 349.18],[169.19, 337.34],[168.84, 325.16],[169.19, 313.32]] },
    { "name": "Animated Short Film", "description": "Awarded to the best animated film under 40 minutes.", "nominees":["Butterfly", "Forevergreen", "The Girl Who Cried Pearls", "Retirement Plan", "The Three Sisters"], "coords": [[169.19, 281.29],[168.84, 269.11],[169.19, 257.27],[168.84, 245.08],[169.19, 233.25]] },
    { "name": "Casting", "description": "Awarded for outstanding achievement in assembling the cast of a feature film.", "nominees":["Hamnet", "Marty Supreme", "One Battle After Another", "The Secret Agent", "Sinners"], "coords": [[168.84, 201.22],[169.19, 189.38],[168.84, 177.2],[169.19, 165.36],[168.84, 153.18]] },
    { "name": "Cinematography", "description": "Awarded for outstanding achievement in visual storytelling through lighting and camerawork.", "nominees":["Frankenstein", "Marty Supreme", "One Battle After Another", "Sinners", "Train Dreams"], "coords": [[309.13, 681.29],[308.78, 669.11],[309.13, 657.27],[308.78, 645.09],[309.13, 633.25]] },
    { "name": "Costume Design", "description": "Awarded for outstanding achievement in the design of garments worn by characters.", "nominees":["Avatar: Fire and Ash", "Frankenstein", "Hamnet", "Marty Supreme", "Sinners"], "coords": [[309.13, 601.22],[309.13, 589.39],[309.13, 577.2],[309.13, 565.37],[309.13, 553.18]] },
    { "name": "Directing", "description": "Awarded for outstanding achievement in the overall creative direction and execution of a film.", "nominees":["Chloé Zhao—Hamnet", "Josh Safdie—Marty Supreme", "Paul Thomas Anderson—One Battle After Another", "Joachim Trier—Sentimental Value", "Ryan Coogler—Sinners"], "coords": [[308.78, 521.15],[309.13, 509.32],[308.78, 497.13],[309.13, 485.3],[308.78, 473.11]] },
    { "name": "Documentary Feature Film", "description": "Awarded to the best feature-length non-fiction film.", "nominees":["The Alabama Solution", "Come See Me in the Good Light", "Cutting Through Rocks", "Mr. Nobody Against Putin", "The Perfect Neighbor"], "coords": [[308.78, 441.08],[309.13, 429.25],[308.78, 417.06],[309.13, 405.23],[309.13, 393.39]] },
    { "name": "Documentary Short Film", "description": "Awarded to the best non-fiction film under 40 minutes.", "nominees":["All the Empty Rooms", "Armed Only with a Camera: The Life and…", "Children No More: “Were and Are Gone”", "The Devil Is Busy", "Perfectly a Strangeness"], "coords": [[309.13, 361.01],[308.78, 348.83],[309.13, 336.99],[308.78, 324.81],[309.13, 312.97]] },
    { "name": "Film Editing", "description": "Awarded for outstanding achievement in assembling visual and audio elements into a cohesive narrative.", "nominees":["F1", "Marty Supreme", "One Battle After Another", "Sentimental Value", "Sinners"], "coords": [[309.13, 281.29],[309.13, 269.11],[309.13, 257.27],[308.78, 245.08],[309.13, 233.25]] },
    { "name": "International Feature Film", "description": "Awarded to the best feature-length film produced outside the US with predominantly non-English dialogue.", "nominees":["The Secret Agent", "It Was Just an Accident", "Sentimental Value", "Sirāt", "The Voice of Hind Rajab"], "coords": [[309.13, 200.87],[309.13, 189.04],[309.13, 176.85],[309.13, 165.01],[309.13, 152.83]] },
    { "name": "Live Action Short Film", "description": "Awarded to the best live-action film under 40 minutes.", "nominees":["Butcher’s Stain", "A Friend of Dorothy", "Jane Austen’s Period Drama", "The Singers", "Two People Exchanging Saliva"], "coords": [[449.08, 681.29],[449.08, 670.5],[449.08, 659.71],[448.73, 648.92],[449.08, 638.47]] },
    { "name": "Makeup and Hairstyling", "description": "Awarded for outstanding achievement in character alteration through makeup and hair design.", "nominees":["Frankenstein", "Kokuho", "Sinners", "The Smashing Machine", "The Ugly Stepsister"], "coords": [[449.08, 607.84],[449.08, 597.05],[449.08, 586.25],[449.08, 575.46],[449.08, 564.67]] },
    { "name": "Music (Original Score)", "description": "Awarded for an outstanding substantial body of original instrumental music written specifically for a film.", "nominees":["Jerskin Fendrix—Bugonia", "Alexandre Desplat—Frankenstein", "Max Richter—Hamnet", "Jonny Greenwood—One Battle After Another", "Ludwig Göransson—Sinners"], "coords": [[449.08, 533.34],[449.08, 522.55],[449.08, 511.75],[449.08, 500.96],[449.08, 490.17]] },
    { "name": "Music (Original Song)", "description": "Awarded to the songwriters for an outstanding original song written specifically for a film.", "nominees":["Dear Me—Diane Warren: Relentless", "Golden—KPop Demon Hunters", "I Lied To You—Sinners", "Sweet Dreams Of Joy—Viva Verdi!", "Train Dreams—Train Dreams"], "coords": [[449.08, 459.53],[449.08, 448.74],[449.08, 437.95],[449.08, 427.16],[448.73, 416.37]] },
    { "name": "Production Design", "description": "Awarded for outstanding achievement in the overall visual look of a film, including set design.", "nominees":["Frankenstein", "Hamnet", "Marty Supreme", "One Battle After Another", "Sinners"], "coords": [[449.08, 385.38],[449.08, 374.59],[449.08, 363.8],[448.73, 353.01],[449.08, 342.56]] },
    { "name": "Sound", "description": "Awarded for outstanding achievement in sound mixing and editing.", "nominees":["F1", "Frankenstein", "One Battle After Another", "Sinners", "Sirāt"], "coords": [[449.08, 311.23],[449.08, 300.44],[448.73, 289.65],[449.08, 279.2],[449.08, 268.41]] },
    { "name": "Visual Effects", "description": "Awarded for outstanding achievement in creating visual effects integrated with live-action.", "nominees":["Avatar: Fire and Ash", "F1", "Jurassic World Rebirth", "The Lost Bus", "Sinners"], "coords": [[449.08, 237.08],[449.08, 226.63],[449.08, 215.84],[449.08, 205.05],[449.08, 194.26]] },
    { "name": "Writing (Adapted Screenplay)", "description": "Awarded for an outstanding screenplay based on previously published or produced material.", "nominees":["Bugonia", "Frankenstein", "Hamnet", "One Battle After Another", "Train Dreams"], "coords": [[449.08, 163.27],[449.08, 152.48],[449.08, 141.69],[449.08, 130.9],[449.08, 120.11]] },
    { "name": "Writing (Original Screenplay)", "description": "Awarded for an outstanding screenplay not based on previously published material.", "nominees":["Blue Moon", "It Was Just an Accident", "Marty Supreme", "Sentimental Value", "Sinners"], "coords": [[449.08, 88.77],[449.08, 77.98],[449.08, 67.19],[449.08, 56.4],[448.73, 45.61]] },
    { "name": "Best Picture", "description": "Awarded to the producers for the most outstanding overall feature film of the year.", "nominees":[ "Bugonia", "F1", "Frankenstein", "Hamnet", "Marty Supreme", "One Battle After Another", "The Secret Agent", "Sentimental Value", "Sinners", "Train Dreams" ],
      "coords": [[169.19, 109.31],[168.84, 96.08],[169.19, 82.86],[169.19, 69.28],[168.84, 55.7],[309.13, 109.31],[308.78, 96.08],[309.13, 82.86],[309.13, 69.28],[309.13, 55.7]]
    }
  ];

  const formGrid = document.getElementById('form-grid');
  
  // Build DOM utilizing isolated Category Cards instead of Fieldsets
  categories.forEach((cat, catIndex) => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.setAttribute('role', 'group');

    const title = document.createElement('div');
    title.className = 'category-title';
    title.textContent = cat.name;
    card.appendChild(title);

    const desc = document.createElement('p');
    desc.className = 'category-desc';
    desc.textContent = cat.description;
    card.appendChild(desc);

    cat.nominees.forEach((nominee, nomIndex) => {
      const label = document.createElement('label');
      label.className = 'nominee-label';
      
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = `cat_${catIndex}`;
      radio.value = nomIndex;
      radio.dataset.wasChecked = "false";
      
      radio.addEventListener('click', function(e) {
        if (this.dataset.wasChecked === "true") {
          this.checked = false;
          this.dataset.wasChecked = "false";
        } else {
          document.querySelectorAll(`input[name="${this.name}"]`).forEach(r => r.dataset.wasChecked = "false");
          this.dataset.wasChecked = "true";
        }
        updateProgress();
      });

      const customRadio = document.createElement('span');
      customRadio.className = 'custom-radio';
      
      const textSpan = document.createElement('span');
      textSpan.className = 'nominee-text';
      textSpan.textContent = nominee;
      
      label.appendChild(radio);
      label.appendChild(customRadio);
      label.appendChild(textSpan);
      card.appendChild(label);
    });
    
    if (cat.name === 'Best Picture') {
      card.style.gridColumn = '1 / -1';
      card.style.display = 'grid';
      card.style.gridTemplateColumns = 'repeat(auto-fit, minmax(280px, 1fr))';
      title.style.gridColumn = '1 / -1';
      desc.style.gridColumn = '1 / -1';
    }
    formGrid.appendChild(card);
  });

  function updateProgress() {
    const total = categories.length;
    const filled = new Set();
    document.querySelectorAll('input[type="radio"]:checked').forEach(el => filled.add(el.name));
    
    const count = filled.size;
    document.getElementById('progress-text').innerText = `${count} / ${total} Categories Selected`;
    document.getElementById('progress-bar').style.width = `${(count / total) * 100}%`;
  }

  function clearForm() {
    document.getElementById('ballot-form').reset();
    document.querySelectorAll('input[type="radio"]').forEach(r => r.dataset.wasChecked = "false");
    updateProgress();
  }

  // Tooltips Engine
  const tooltipCache = {};
  let hoverTimeout;
  let mouseX = 0; let mouseY = 0;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX; mouseY = e.clientY;
    const tooltip = document.getElementById('wiki-tooltip');
    if (tooltip && tooltip.classList.contains('visible')) {
      let x = mouseX + 15; let y = mouseY + 15;
      const ttWidth = tooltip.offsetWidth || 500;
      const ttHeight = tooltip.offsetHeight || 300;
      
      // Keep tooltip strictly inside the viewport
      if (x + ttWidth > window.innerWidth) x = mouseX - ttWidth - 10; 
      if (y + ttHeight > window.innerHeight) y = window.innerHeight - ttHeight - 10;
      if (x < 10) x = 10;
      if (y < 10) y = 10;
      
      tooltip.style.left = `${x}px`; tooltip.style.top = `${y}px`;
    }
  });

  function initTooltips() {
    const tooltip = document.createElement('div');
    tooltip.id = 'wiki-tooltip'; tooltip.className = 'wiki-tooltip';
    
    // Allow users to mouse into the tooltip to scroll if the text is long
    tooltip.addEventListener('mouseenter', () => { clearTimeout(hoverTimeout); });
    tooltip.addEventListener('mouseleave', () => { tooltip.classList.remove('visible'); });

    tooltip.innerHTML = `
      <div class="tooltip-layout">
        <img src="" alt="" id="tt-img" class="tooltip-img">
        <div class="tooltip-content">
          <div class="tooltip-title" id="tt-title"></div>
          <div class="tooltip-desc" id="tt-desc"></div>
        </div>
      </div>
    `;
    document.body.appendChild(tooltip);

    document.querySelectorAll('.nominee-label').forEach(label => {
      label.addEventListener('mouseenter', () => {
        clearTimeout(hoverTimeout);
        hoverTimeout = setTimeout(async () => {
          const textElement = label.querySelector('.nominee-text');
          const fullText = textElement.textContent;
          const categoryCard = label.closest('.category-card');
          const category = categoryCard.querySelector('.category-title').textContent;
          
          tooltip.classList.add('visible');
          document.getElementById('tt-title').textContent = "Loading context...";
          document.getElementById('tt-desc').innerHTML = "";
          document.getElementById('tt-img').style.display = 'none';
          
          let searchTarget = fullText;
          let displayName = fullText;
          const isPersonCategory =['Actor', 'Actress', 'Directing', 'Score'].some(c => category.includes(c));

          if (isPersonCategory && fullText.includes('—')) {
            const parts = fullText.split('—');
            searchTarget = parts[0].trim(); 
            displayName = parts[0].trim();
          } else if (!isPersonCategory) {
            if (fullText.includes('—')) {
              const parts = fullText.split('—');
              let moviePart = parts[parts.length - 1];
              if (moviePart.includes(':')) moviePart = moviePart.split(':')[1];
              searchTarget = moviePart.trim() + " film";
              displayName = fullText;
            } else {
              searchTarget = fullText + " film";
              displayName = fullText;
            }
          }

          // Force an impossible search string so Wikipedia gracefully fails and returns "No image" instead of the wrong poster
          const overrides = {
            "Children No More: “Were and Are Gone”": "zxcvbnm_impossible_image_query",
            "Dear Me—Diane Warren: Relentless": "Relentless film",
            "Sweet Dreams Of Joy—Viva Verdi!": "Viva Verdi! film"
          };
          if (overrides[fullText]) searchTarget = overrides[fullText];

          // 1. Find Context in Local JSON - Strictly matches the specific Category first
          let localDescHtml = "";
          if (contextLoadError) {
             localDescHtml = `<span class="tooltip-error">Context unavailable. Ensure info.json is in the same folder.<br><br>(Note: Chrome blocks local file reading for security if running via file://. Open via Firefox or a local web-server).</span>`;
          } else if (oscarContextData) {
             const targetNorm = normalizeText(fullText);
             const categoryNorm = normalizeText(category);
             let foundDetails = null;
             
             // Pinpoint the exact category
             const matchedCat = oscarContextData.find(c => normalizeText(c.name).includes(categoryNorm) || categoryNorm.includes(normalizeText(c.name)));
             
             if (matchedCat) {
               // Pinpoint the specific nominee within that category
               for (const nom of matchedCat.nominees) {
                 const jsonNorm = normalizeText(nom.name);
                 if (jsonNorm.includes(targetNorm) || targetNorm.includes(jsonNorm)) {
                   foundDetails = nom.details;
                   break;
                 }
               }
             }
             
             if (foundDetails) {
               localDescHtml = foundDetails.map(p => parseMarkdown(p)).join('<br><br>');
             } else {
               localDescHtml = "<em>No extended context found for this nominee in this category.</em>";
             }
          }

          // 2. Fetch Image from Wikipedia
          if (!tooltipCache[searchTarget]) {
             try {
               const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&prop=pageimages&generator=search&piprop=thumbnail&pithumbsize=400&pilicense=any&origin=*&gsrsearch=${encodeURIComponent(searchTarget)}&gsrlimit=1`;
               const response = await fetch(url);
               const data = await response.json();
               
               if (data.query && data.query.pages) {
                 const pageId = Object.keys(data.query.pages)[0];
                 const page = data.query.pages[pageId];
                 tooltipCache[searchTarget] = { title: displayName, image: page.thumbnail ? page.thumbnail.source : null };
               } else {
                 tooltipCache[searchTarget] = { title: displayName, image: null };
               }
             } catch(err) { tooltipCache[searchTarget] = { title: displayName, image: null }; }
          }
          
          if (!tooltip.classList.contains('visible')) return;
          
          const result = tooltipCache[searchTarget];
          const imgEl = document.getElementById('tt-img');
          
          document.getElementById('tt-title').textContent = result.title;
          document.getElementById('tt-desc').innerHTML = localDescHtml;

          if (result.image) {
            imgEl.src = result.image; imgEl.style.display = 'block';
          } else {
            imgEl.style.display = 'none';
            document.getElementById('tt-title').textContent = result.title + " (No image)";
          }

          // Initial placement re-calculation after content loads
          let x = mouseX + 15; let y = mouseY + 15;
          const ttWidth = tooltip.offsetWidth || 500;
          const ttHeight = tooltip.offsetHeight || 300;
          if (x + ttWidth > window.innerWidth) x = mouseX - ttWidth - 10; 
          if (y + ttHeight > window.innerHeight) y = window.innerHeight - ttHeight - 10;
          if (x < 10) x = 10;
          if (y < 10) y = 10;
          tooltip.style.left = `${x}px`; tooltip.style.top = `${y}px`;

        }, 350); 
      });
      label.addEventListener('mouseleave', () => {
        // slight delay to allow the user to move their mouse into the tooltip if they want to scroll the text
        hoverTimeout = setTimeout(() => { tooltip.classList.remove('visible'); }, 100);
      });
    });
  }

  // File Generators
  async function fetchBallotTemplate(btnText) {
    const localFile = 'letterboxd-2026-oscars-ballot.pdf';
    const originalUrl = 'https://a2.ltrbxd.com/oscars/2026/letterboxd-2026-oscars-ballot.pdf';
    const encodedUrl = encodeURIComponent(originalUrl);
    
    const endpoints =[
      localFile,
      originalUrl, 
      `https://corsproxy.io/?${encodedUrl}`, 
      `https://api.allorigins.win/raw?url=${encodedUrl}`,
      `https://api.codetabs.com/v1/proxy?quest=${encodedUrl}`
    ];

    for (let i = 0; i < endpoints.length; i++) {
      try {
        if (i === 0) btnText.innerText = `Looking for local PDF...`;
        else btnText.innerText = `Fetching template (Route ${i}/${endpoints.length-1})...`;
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); 

        const response = await fetch(endpoints[i], { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (!response.ok) continue; 
        
        const arrayBuffer = await response.arrayBuffer();
        const view = new Uint8Array(arrayBuffer);
        if (view[0] === 0x25 && view[1] === 0x50 && view[2] === 0x44 && view[3] === 0x46) {
          return arrayBuffer;
        }
      } catch (e) {
        if (i > 0) console.warn(`Attempt ${i} failed:`, e);
      }
    }
    throw new Error("Could not load local PDF and all remote proxy routes failed.");
  }

  async function generateFile(format) {
    const btns = document.querySelectorAll('button');
    const loader = document.getElementById(`loader-${format}`);
    const btnText = document.getElementById(`text-${format}`);
    const originalText = format === 'pdf' ? 'Save PDF' : 'Save PNG';
    
    btns.forEach(b => b.disabled = true);
    loader.style.display = 'inline-block';

    try {
      const existingPdfBytes = await fetchBallotTemplate(btnText);

      btnText.innerText = 'Applying selections...';
      const { PDFDocument, rgb } = window.PDFLib;
      const pdfDoc = await PDFDocument.load(existingPdfBytes);
      const firstPage = pdfDoc.getPages()[0];

      categories.forEach((cat, catIndex) => {
        const selected = document.querySelector(`input[name="cat_${catIndex}"]:checked`);
        if (selected) {
          const nomIndex = parseInt(selected.value, 10);
          const[x, y] = cat.coords[nomIndex];
          firstPage.drawCircle({ x, y, size: 3.5, color: rgb(0, 0.878, 0.329) });
        }
      });

      const pdfBytes = await pdfDoc.save();

      if (format === 'pdf') {
        btnText.innerText = 'Saving PDF...';
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = '2026_Oscars_Ballot_Completed.pdf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
      } else if (format === 'png') {
        btnText.innerText = 'Rendering PNG...';
        const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        
        // Increased scaling from 3 to 5 for ultra-high-definition, print-quality PNG output
        const scale = 5; 
        const viewport = page.getViewport({ scale: scale });
        
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height; canvas.width = viewport.width;
        
        const renderContext = { canvasContext: context, viewport: viewport };
        await page.render(renderContext).promise;
        
        btnText.innerText = 'Saving PNG...';
        const pngUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = pngUrl;
        link.download = '2026_Oscars_Ballot_Completed.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      }
      
    } catch (error) {
      console.error(error);
      alert('An error occurred. ' + error.message);
    } finally {
      btns.forEach(b => b.disabled = false);
      loader.style.display = 'none';
      btnText.innerText = originalText;
    }
  }

  updateProgress();
  initTooltips();
</script>
